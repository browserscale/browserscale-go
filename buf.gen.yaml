version: v2
plugins:
  - local: protoc-gen-go
    out: generated
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: generated
    opt: paths=source_relative
inputs:
  # Single source of truth for the wire contract lives in the TS SDK's proto/
  # (its go_package points at github.com/browserscale/browserscale-go/generated).
  - directory: ../browserscale-ts/proto
